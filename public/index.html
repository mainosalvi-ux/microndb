<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micronation Database</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">
      <i class="ti ti-globe"></i>
      <h1>Micronation DB</h1>
      <p>Sign in to your account</p>
    </div>
    <div class="card login-card">
      <div class="form-group"><label>Email</label><input id="login-email" type="email" placeholder="your@email.com" autocomplete="email"></div>
      <div class="form-group"><label>Password</label><input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div id="login-err" class="form-error"></div>
      <button class="btn primary full" id="login-btn" onclick="doLogin()"><i class="ti ti-login"></i> Sign in</button>
    </div>
    <p class="login-hint">Don't have an account? Contact the administrator.</p>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="screen">
  <aside class="sidebar">
    <div class="sidebar-logo"><i class="ti ti-globe"></i><span>Micronation DB</span></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="adminTab('overview',this)"><i class="ti ti-home"></i> Overview</button>
      <button class="nav-item" onclick="adminTab('nations',this)"><i class="ti ti-map"></i> Nations</button>
      <button class="nav-item" onclick="adminTab('accounts',this)"><i class="ti ti-users"></i> Accounts</button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar admin-avatar">A</div>
        <div><div class="user-name">Admin</div><div class="user-email">mainosalvi@gmail.com</div></div>
      </div>
      <button class="btn ghost sm" onclick="doLogout()"><i class="ti ti-logout"></i></button>
    </div>
  </aside>
  <main class="main-content">
    <div id="tab-overview" class="tab-panel active"></div>
    <div id="tab-nations" class="tab-panel"></div>
    <div id="tab-accounts" class="tab-panel"></div>
  </main>
</div>

<!-- USER -->
<div id="screen-user" class="screen">
  <header class="user-header">
    <div class="user-header-left">
      <i class="ti ti-globe" style="font-size:20px;color:var(--muted)"></i>
      <h1 id="user-nation-name">My Nation</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="user-info-pill" class="user-pill"></div>
      <button class="btn ghost sm" onclick="doLogout()"><i class="ti ti-logout"></i> Sign out</button>
    </div>
  </header>
  <div class="user-tabs-bar">
    <button class="user-tab active" onclick="userTab('records',this)"><i class="ti ti-database"></i> Records</button>
    <button class="user-tab" onclick="userTab('docs',this)"><i class="ti ti-files"></i> Documents</button>
  </div>

  <!-- Records panel -->
  <div id="user-records-panel" class="user-body">
    <div class="toolbar">
      <div class="search-box"><i class="ti ti-search"></i><input id="user-search" placeholder="Search records…" oninput="renderUserRecords()"></div>
      <span id="user-count" class="count-badge"></span>
      <button class="btn primary sm" style="margin-left:auto" onclick="openNewRecord()"><i class="ti ti-plus"></i> Add record</button>
    </div>
    <div id="user-records"></div>
  </div>

  <!-- Documents panel -->
  <div id="user-docs-panel" class="user-body" style="display:none">
    <div class="toolbar">
      <label class="btn" style="cursor:pointer"><i class="ti ti-paperclip"></i> Choose file
        <input type="file" id="doc-input" style="display:none" onchange="document.getElementById('upload-btn').disabled=!this.files.length">
      </label>
      <span id="doc-filename" style="font-size:13px;color:var(--muted)"></span>
      <button class="btn primary sm" id="upload-btn" onclick="uploadDoc()" disabled style="margin-left:auto"><i class="ti ti-upload"></i> Upload</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Supported: PDF, Word, Excel, images, TXT · Max 10MB</p>
    <div id="user-docs"></div>
  </div>
</div>

<!-- MODAL: Account -->
<div id="modal-account" class="modal-overlay" onclick="closeModalOverlay('modal-account',event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-acc-title">Create account</h2>
      <button class="btn icon" onclick="closeModal('modal-account')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Full name</label><input id="acc-name" placeholder="Name Surname"></div>
        <div class="form-group"><label>Email</label><input id="acc-email" type="email" placeholder="user@email.com"></div>
      </div>
      <div class="form-group"><label>Password</label><input id="acc-pass" type="password" placeholder="Set a password"></div>
      <div class="form-group"><label>Micronation name</label><input id="acc-nation" placeholder="e.g. Kingdom of Aurelia"></div>
      <div class="form-group">
        <label>Citizen form fields <span class="label-hint">— what citizens fill in when they register</span></label>
        <div id="acc-fields-list"></div>
        <button class="btn ghost sm" style="margin-top:6px" onclick="addAccField()"><i class="ti ti-plus"></i> Add field</button>
      </div>
      <div id="acc-err" class="form-error"></div>
    </div>
    <div class="modal-footer">
      <button id="del-acc-btn" class="btn danger" onclick="deleteAccount()" style="display:none;margin-right:auto"><i class="ti ti-trash"></i> Delete account</button>
      <button class="btn ghost" onclick="closeModal('modal-account')">Cancel</button>
      <button class="btn primary" onclick="saveAccount()">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: Record -->
<div id="modal-record" class="modal-overlay" onclick="closeModalOverlay('modal-record',event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-rec-title">New record</h2>
      <button class="btn icon" onclick="closeModal('modal-record')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body"><div id="record-form"></div></div>
    <div class="modal-footer">
      <button id="del-rec-btn" class="btn danger" onclick="deleteRecord()" style="display:none;margin-right:auto"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn ghost" onclick="closeModal('modal-record')">Cancel</button>
      <button class="btn primary" onclick="saveRecord()">Save record</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/js/app.js"></script>
</body>
</html>
